<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Kimball</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
</head>
<body>
    <header><h1>Kimball</h1></header>
    <main class="gallery-container">
<section class="image-viewer">
    <!-- The JavaScript will inject the source here automatically -->
    <img id="gallery-photo" alt="Gallery photo">
    
    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>
</section>

      <aside class="exif-info">
    <h2>Camera Settings</h2>
    <ul>
        <li><strong>Model:</strong> <span data-exif="Model">-</span></li>
        <li><strong>Lens:</strong> <span data-exif="Lens">-</span></li>
        <li><strong>ISO:</strong> <span data-exif="ISO">-</span></li>
        <li><strong>F-Stop:</strong> <span data-exif="F-Stop">-</span></li>
        <li><strong>Shutter:</strong> <span data-exif="Shutter">-</span></li>
        <li><strong>Focal Length:</strong> <span data-exif="Focal Length">-</span></li>
    </ul>
</aside>
    </main>

<!-- This script fetches the JSON and fills the fields above -->
    <script>
let currentIndex = 0;
let photoData = []; // This will hold your JSON array

document.addEventListener('DOMContentLoaded', async () => {
    // 1. Fetch data once
    const response = await fetch('gallery-data.json');
    photoData = await response.json();

    // 2. Setup navigation listeners
    document.getElementById('prevBtn').addEventListener('click', () => changeImage(-1));
    document.getElementById('nextBtn').addEventListener('click', () => changeImage(1));

    // 3. Show the first image
    if (photoData.length > 0) showImage(0);
});

document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowLeft') {
        // Move backward
        changeImage(-1);
    } else if (event.key === 'ArrowRight') {
        // Move forward
        changeImage(1);
    }
});

function changeImage(direction) {
    currentIndex = (currentIndex + direction + photoData.length) % photoData.length;
    showImage(currentIndex);
}

function showImage(index) {
    const item = photoData[index];
    const img = document.getElementById('gallery-photo');
    
    // Update Image Source
    img.src = item.SourceFile; 

    // Map metadata to UI
    const dataMap = {
        'Model': item.Model,
        'Lens': item.LensModel,
        'ISO': item.ISOSpeedRatings,
        'F-Stop': `f/${item.FNumber}`,
        'Shutter': item.ExposureTime,
        'Focal Length': `${item.FocalLength}`
    };

    // Update UI elements
    Object.keys(dataMap).forEach(key => {
        const el = document.querySelector(`[data-exif="${key}"]`);
        if (el) el.innerText = dataMap[key] || 'N/A';
    });
}
    </script>


</body>
</html>
